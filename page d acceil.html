<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projet a deux   </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
     <link rel="stylesheet" href="style.css">
</head>
<body>
 
        
        <!-- Section d'inscription -->
        <div class="inscription">
            <h1>BIENVENUE DANS LA CONSULTATION EN LIGNE</h1>
            <p>Remplissez le formulaire de la consultation ci-dessous .</p>
            
            <form id="inscriptionForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>
                        </div>
                        <div class="error-message" id="error-prenom">Le prénom doit contenir au moins 2 caractères</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                        </div>
                      
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="age">age</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="age" id="age" name="age" placeholder="exemple:18ans" required>
                    </div>
                    
                </div>
                
                <div class="form-group">
                    <label for="poid">poid</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="weight" id="weight" name="weight" placeholder="exemple:53KG" required>
                    </div>

                </div>
                
                <div class="form-group">
                          <label for="size">TAILLE</label>
                        <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="size" id="size" name="size" placeholder="exemple:1.80" required>

                    </div>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">J'accepte les <a href="#">conditions d'utilisation</a> et la <a href="#">politique de confidentialité</a></label>
                </div>
              
                
                <button type="submit" class="btn-submit">
                    <a href="consultation.html">S'inscrire maintenant</a> 
                </button>
            </form>
            
          
    
</body>
</html>
